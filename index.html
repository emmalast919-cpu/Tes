<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:    #5865f2;
      --bluel:   #7983f5;
      --green:   #57f287;
      --red:     #ed4245;
      --yellow:  #fee75c;
      --bg:      #050709;
      --surface: rgba(255,255,255,.038);
      --border:  rgba(255,255,255,.075);
      --text:    #e2e8f0;
      --muted:   #475569;
      --subtle:  #1e293b;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Background layers ── */
    .bg-noise {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
      background-size: 200px;
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(88,101,242,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,101,242,.035) 1px, transparent 1px);
      background-size: 56px 56px;
    }
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none;
      filter: blur(130px); will-change: transform; z-index: 0;
    }
    .orb-1 {
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(88,101,242,.15) 0%, transparent 65%);
      top: -300px; left: -250px;
      animation: orb1 16s ease-in-out infinite;
    }
    .orb-2 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(87,242,135,.1) 0%, transparent 65%);
      bottom: -250px; right: -200px;
      animation: orb2 20s ease-in-out infinite;
    }
    .orb-3 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(235,69,158,.07) 0%, transparent 65%);
      top: 40%; left: 50%; transform: translate(-50%,-50%);
      animation: orb3 25s ease-in-out infinite;
    }
    @keyframes orb1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(80px,50px)} 66%{transform:translate(-40px,80px)} }
    @keyframes orb2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-60px,-40px)} 66%{transform:translate(40px,-70px)} }
    @keyframes orb3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.15)} }

    /* ── Particles ── */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .pt {
      position: absolute; border-radius: 50%;
      animation: ptrise linear infinite;
    }
    @keyframes ptrise {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: .6; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 10;
      background: var(--surface);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 44px 40px;
      max-width: 488px;
      width: calc(100% - 28px);
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.035) inset,
        0 60px 140px rgba(0,0,0,.75),
        0 0 0 1px rgba(88,101,242,.06);
      animation: cardIn .65s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(36px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-shine {
      position: absolute; inset: 0; border-radius: 28px; pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, transparent 50%);
    }

    /* ── Logo ── */
    .logo-area { margin-bottom: 32px; }
    .logo-frame {
      position: relative; display: inline-flex;
      align-items: center; justify-content: center;
      width: 80px; height: 80px;
    }
    .logo-pulse {
      position: absolute; inset: -8px; border-radius: 50%;
      border: 1.5px solid rgba(88,101,242,.45);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .logo-pulse-2 {
      position: absolute; inset: -18px; border-radius: 50%;
      border: 1px solid rgba(88,101,242,.18);
      animation: pulse 2.4s ease-in-out infinite .4s;
    }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
    .logo-bg {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(88,101,242,.18), rgba(88,101,242,.06));
      border: 1px solid rgba(88,101,242,.28);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(88,101,242,.22), 0 8px 32px rgba(0,0,0,.4);
    }
    .logo-svg { width: 44px; height: 44px; filter: drop-shadow(0 0 12px rgba(88,101,242,.6)); }

    /* ── Typography ── */
    .title {
      font-size: 1.7rem; font-weight: 800; letter-spacing: -.04em;
      margin-bottom: 8px; line-height: 1.15;
    }
    .title span { background: linear-gradient(135deg, #fff 30%, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { font-size: .88rem; color: var(--muted); line-height: 1.65; }

    /* ── Divider ── */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 28px -44px; }

    /* ── Progress Steps (verification mode) ── */
    .steps { display: flex; flex-direction: column; gap: 8px; margin: 24px 0 28px; text-align: left; }
    .step {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 16px; border-radius: 14px; border: 1px solid transparent;
      transition: all .35s cubic-bezier(.22,1,.36,1);
    }
    .step.s-done   { background: rgba(87,242,135,.06);  border-color: rgba(87,242,135,.2); }
    .step.s-active { background: rgba(88,101,242,.07);  border-color: rgba(88,101,242,.25); }
    .step.s-wait   { background: rgba(255,255,255,.02); border-color: rgba(255,255,255,.05); opacity: .45; }
    .step-ico {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 800; transition: all .35s;
    }
    .step.s-done   .step-ico { background: rgba(87,242,135,.18); color: var(--green); }
    .step.s-active .step-ico { background: rgba(88,101,242,.18); color: var(--bluel); }
    .step.s-wait   .step-ico { background: rgba(255,255,255,.05); color: var(--muted); }
    .spin {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2.5px solid rgba(88,101,242,.25); border-top-color: var(--bluel);
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step-body { flex: 1; min-width: 0; }
    .step-label { font-size: .86rem; font-weight: 700; line-height: 1; margin-bottom: 3px; }
    .step.s-done   .step-label { color: #86efac; }
    .step.s-active .step-label { color: #a5b4fc; }
    .step.s-wait   .step-label { color: var(--muted); }
    .step-hint { font-size: .74rem; color: var(--muted); }

    /* ── Progress bar ── */
    .progress-wrap { margin: 0 0 6px; }
    .progress-label { display: flex; justify-content: space-between; font-size: .72rem; color: var(--muted); margin-bottom: 8px; }
    .progress-track {
      height: 4px; border-radius: 99px;
      background: rgba(255,255,255,.06);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--blue), var(--bluel));
      transition: width 1s cubic-bezier(.22,1,.36,1);
      box-shadow: 0 0 10px rgba(88,101,242,.5);
    }

    /* ── Landing cards ── */
    .how-list { display: flex; flex-direction: column; gap: 8px; margin: 20px 0 24px; text-align: left; }
    .how-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px; border-radius: 12px;
      background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.06);
      font-size: .83rem; line-height: 1.55; color: #94a3b8;
      animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both;
    }
    .how-item:nth-child(1){animation-delay:.05s}.how-item:nth-child(2){animation-delay:.1s}.how-item:nth-child(3){animation-delay:.15s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .how-num {
      min-width: 26px; height: 26px; border-radius: 50%;
      background: rgba(88,101,242,.18); color: #a5b4fc;
      font-size: .72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
    }

    /* ── Perms ── */
    .perms { display: flex; flex-wrap: wrap; justify-content: center; gap: 7px; margin-bottom: 22px; }
    .perm {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.07);
      border-radius: 999px; padding: 6px 13px;
      font-size: .75rem; color: #94a3b8; font-weight: 500;
    }
    .perm-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

    /* ── Safe box ── */
    .safe-box {
      background: rgba(87,242,135,.04); border: 1px solid rgba(87,242,135,.12);
      border-radius: 12px; padding: 13px 16px;
      font-size: .78rem; color: #6ee7a0; line-height: 1.7; text-align: left;
    }
    .safe-box b { display: block; margin-bottom: 2px; }

    /* ── Error box ── */
    .err-icon {
      width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 22px;
      background: rgba(237,66,69,.08); border: 2px solid rgba(237,66,69,.3);
      display: flex; align-items: center; justify-content: center; font-size: 1.9rem;
      animation: pop .45s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
    .err-box {
      background: rgba(237,66,69,.07); border: 1px solid rgba(237,66,69,.18);
      border-radius: 12px; padding: 13px 16px;
      font-size: .8rem; color: #fca5a5; margin-bottom: 14px; text-align: left; line-height: 1.6;
    }
    .hint-box {
      background: rgba(88,101,242,.07); border: 1px solid rgba(88,101,242,.18);
      border-radius: 12px; padding: 12px 16px;
      font-size: .78rem; color: #a5b4fc; margin-bottom: 22px; text-align: left; line-height: 1.6;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #5865f2, #4752c4);
      color: #fff; border-radius: 12px; padding: 12px 28px;
      font-size: .9rem; font-weight: 600; text-decoration: none; cursor: pointer;
      box-shadow: 0 6px 20px rgba(88,101,242,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(88,101,242,.45); }

    /* ── Footer ── */
    .footer {
      margin-top: 22px; font-size: .69rem; color: rgba(255,255,255,.11);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .fd { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,.11); }

    /* ── Glow title on landing ── */
    .shield-icon {
      width: 84px; height: 84px; border-radius: 50%; margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(88,101,242,.2), rgba(88,101,242,.05));
      border: 2px solid rgba(88,101,242,.28);
      display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
      box-shadow: 0 0 50px rgba(88,101,242,.22);
      animation: shieldGlow 3s ease-in-out infinite;
    }
    @keyframes shieldGlow { 0%,100%{box-shadow:0 0 40px rgba(88,101,242,.2)} 50%{box-shadow:0 0 70px rgba(88,101,242,.45)} }
  </style>
</head>
<body>
  <div class="bg-noise"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div id="particles"></div>

  <div class="card">
    <div class="card-shine"></div>

    <!-- Logo (always shown) -->
    <div class="logo-area">
      <div class="logo-frame">
        <div class="logo-pulse"></div>
        <div class="logo-pulse-2"></div>
        <div class="logo-bg">
          <svg class="logo-svg" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
            <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z" fill="#5865F2"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Dynamic content area -->
    <div id="body"></div>

    <div class="footer">
      <span>Discord OAuth2</span><div class="fd"></div>
      <span>Secure</span><div class="fd"></div>
      <span>Encrypted</span><div class="fd"></div>
      <span>Private</span>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────
    // ⚠️  UPDATE this URL when you redeploy Replit
    //    Deployed format: https://your-bot-name.replit.app/callback
    // ─────────────────────────────────────────────────────────────────
    const BOT_CALLBACK = 'https://d4ce8bf1-bfeb-43ae-8a0c-a9eb9ed347aa-00-221mz8qbs1vjw.janeway.replit.dev/callback';

    // Spawn floating particles
    (function spawnParticles() {
      const wrap   = document.getElementById('particles');
      const colors = ['rgba(88,101,242,.55)', 'rgba(87,242,135,.35)', 'rgba(235,69,158,.25)', 'rgba(254,231,92,.2)'];
      for (let i = 0; i < 22; i++) {
        const p    = document.createElement('div');
        p.className = 'pt';
        const size = Math.random() * 4 + 1.5;
        p.style.cssText = [
          `left:${Math.random()*100}%`,
          `width:${size}px`, `height:${size}px`,
          `background:${colors[Math.floor(Math.random()*colors.length)]}`,
          `animation-duration:${Math.random()*14+8}s`,
          `animation-delay:${Math.random()*12}s`,
        ].join(';');
        wrap.appendChild(p);
      }
    })();

    const body   = document.getElementById('body');
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    const error  = params.get('error');

    // ─── Render helpers ───────────────────────────────────────
    function stepHtml(icon, label, hint, status) {
      const icoHtml = status === 'active'
        ? '<div class="spin"></div>'
        : `<span>${icon}</span>`;
      return `
        <div class="step s-${status}">
          <div class="step-ico">${icoHtml}</div>
          <div class="step-body">
            <div class="step-label">${label}</div>
            <div class="step-hint">${hint}</div>
          </div>
        </div>`;
    }

    // ─── VERIFICATION FLOW ────────────────────────────────────
    if (error) {
      body.innerHTML = `
        <div class="err-icon">✕</div>
        <div class="title"><span style="-webkit-text-fill-color:#f87171">Cancelled</span></div>
        <p class="subtitle" style="margin-bottom:18px">You cancelled the authorization. No changes were made to your account.</p>
        <div class="hint-box">💡 Go back to your Discord server and click <strong>✅ Verify Me</strong> to try again.</div>`;

    } else if (code) {
      // Step 1 — animate through steps, then redirect
      let progress = 35;

      body.innerHTML = `
        <div class="title"><span>Verifying…</span></div>
        <p class="subtitle">Authorization received — connecting to server.</p>

        <div class="progress-wrap" style="margin-top:22px">
          <div class="progress-label"><span>Progress</span><span id="pct">35%</span></div>
          <div class="progress-track"><div class="progress-fill" id="pbar" style="width:35%"></div></div>
        </div>

        <div class="steps" id="steps">
          ${stepHtml('✓', 'Discord Authorized',    'OAuth2 code received',              'done'  )}
          ${stepHtml('2', 'Connecting to Server',  'Establishing secure connection…',   'active')}
          ${stepHtml('3', 'Assigning Role',         'Waiting for server…',               'wait'  )}
        </div>`;

      // Animate progress to 70%, then redirect
      setTimeout(() => {
        progress = 70;
        document.getElementById('pbar').style.width = '70%';
        document.getElementById('pct').textContent  = '70%';

        document.getElementById('steps').innerHTML =
          stepHtml('✓', 'Discord Authorized',    'OAuth2 code received',           'done'  ) +
          stepHtml('✓', 'Server Connected',      'Secure tunnel established',      'done'  ) +
          stepHtml('3', 'Assigning Role',        'Granting verified access…',      'active');
      }, 600);

      setTimeout(() => {
        progress = 92;
        document.getElementById('pbar').style.width = '92%';
        document.getElementById('pct').textContent  = '92%';
      }, 1100);

      setTimeout(() => {
        const dest = BOT_CALLBACK
          + '?code='  + encodeURIComponent(code)
          + '&state=' + encodeURIComponent(state || '');
        window.location.replace(dest);   // browser GET — no CORS
      }, 1400);

    } else {
      // ─── LANDING PAGE ───────────────────────────────────────
      body.innerHTML = `
        <div class="shield-icon">🛡️</div>
        <div class="title"><span>Verification Portal</span></div>
        <p class="subtitle" style="margin-bottom:0">Secure Discord account verification system.</p>

        <div class="divider"></div>

        <div class="how-list">
          <div class="how-item">
            <div class="how-num">1</div>
            <div>Open your <strong style="color:#c7d2fe">Discord server</strong> and find the <strong style="color:#c7d2fe">#verification</strong> channel.</div>
          </div>
          <div class="how-item">
            <div class="how-num">2</div>
            <div>Click <strong style="color:#c7d2fe">✅ Verify Me</strong> — a personal one-time link will be sent to you.</div>
          </div>
          <div class="how-item">
            <div class="how-num">3</div>
            <div>Authorize on Discord — you'll land here briefly, then be verified and redirected automatically.</div>
          </div>
        </div>

        <div class="perms">
          <div class="perm"><div class="perm-dot"></div>Username only</div>
          <div class="perm"><div class="perm-dot"></div>Avatar only</div>
          <div class="perm"><div class="perm-dot"></div>No messages</div>
          <div class="perm"><div class="perm-dot"></div>No DM access</div>
          <div class="perm"><div class="perm-dot"></div>No friends list</div>
        </div>

        <div class="safe-box">
          <b>🔒 Is this safe for my account?</b>
          Yes. Only your <em>username</em> and <em>avatar</em> are read. The <em>guilds.join</em> scope lets the bot add you to the server you authorized — nothing else. No other servers can be accessed. Your token is stored privately on the bot's server and never shared.
        </div>`;
    }
  </script>
</body>
</html>
